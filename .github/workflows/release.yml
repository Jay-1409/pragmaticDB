name: Release

on:
  push:
    tags:
      - 'v*'
      - 'beta'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: pragmaticdb-linux-x64
          - os: macos-latest
            asset_name: pragmaticdb-macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make app

      - name: Rename binary
        run: mv app ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pragmaticdb-linux-x64/pragmaticdb-linux-x64
            pragmaticdb-macos-x64/pragmaticdb-macos-x64
